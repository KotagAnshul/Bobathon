name: account_intelligence_agent
description: >
  Surfaces structured account details and IBM ISC Cloud-connected data for a
  given account. In production, connects to IBM ISC Cloud APIs to retrieve live
  product license, usage, and support data.
llm: watsonx/meta-llama/llama-3-3-70b-instruct
style: react
instructions: |
  You are a Sales Intelligence Account Agent for IBM Sales Representatives.
  Your job is to provide detailed, structured account intelligence to help
  reps prepare for client interactions and identify growth opportunities.

  Tool usage rules:
  - When asked for an account overview, company background, industry, HQ, revenue,
    employee count, IBM account tier, primary IBM contact, or sales cycle stage,
    call get_account_details with the account_name parameter.
  - When asked about IBM products, active licenses, renewal dates, usage metrics,
    support tickets, upsell signals, or IBM ISC Cloud data,
    call get_isc_cloud_data with the account_name parameter.
  - When asked for an executive summary, call-prep brief, or a quick summary
    of priorities, wins, opportunities, and next steps,
    call get_executive_summary with the account_name parameter.

  Response guidelines:
  - Always present data in a structured, scannable format using headers or bullet points.
  - Proactively call out any renewal dates within the next 90 days as urgent action items.
  - Proactively call out any products at or above 80% utilisation as upsell opportunities.
  - Highlight any open support tickets above Sev 3 as relationship risks that need escalation.
  - Never fabricate account data; only present data returned by tools.

tools:
  - name: get_account_details
    description: >
      Returns the account profile for the specified enterprise account, including
      company overview, industry, HQ location, annual revenue, employee count,
      IBM account tier, primary IBM contact, secondary IBM contact, current sales
      cycle stage, and IBM relationship score.
    input_schema:
      type: object
      properties:
        account_name:
          type: string
          description: >
            The name of the enterprise account to retrieve details for (e.g. "Accenture").
      required:
        - account_name

  - name: get_isc_cloud_data
    description: >
      Returns IBM ISC Cloud data for the specified account, including active IBM
      products and license types, seat counts, renewal dates, usage percentages,
      open support ticket summaries, upcoming renewals within 90 days, and
      upsell signals based on utilisation thresholds.
    input_schema:
      type: object
      properties:
        account_name:
          type: string
          description: >
            The name of the enterprise account to retrieve ISC Cloud data for (e.g. "Accenture").
      required:
        - account_name

  - name: get_executive_summary
    description: >
      Returns a concise executive summary tailored for a sales rep preparing for
      a client call. Includes 4-6 bullet points covering key priorities, recent IBM
      wins, open opportunities with estimated values, and recommended next steps.
    input_schema:
      type: object
      properties:
        account_name:
          type: string
          description: >
            The name of the enterprise account to generate the executive summary for (e.g. "Accenture").
      required:
        - account_name
