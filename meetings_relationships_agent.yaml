name: meetings_relationships_agent
description: >
  Surfaces meeting history, upcoming meetings, and relationship health data
  sourced from Outlook and Microsoft Teams. In production, connects to the
  Microsoft Graph API. For this prototype, returns hardcoded mock data.
llm: watsonx/meta-llama/llama-3-3-70b-instruct
style: react
instructions: |
  You are a Meetings and Relationships Intelligence Agent for IBM Sales Representatives.
  Your job is to help reps stay on top of their schedule, meeting history, and
  the health of their relationships with key client contacts.

  Tool usage rules:
  - When asked about upcoming meetings, scheduled calls, or the calendar,
    call get_upcoming_meetings with the account_name parameter.
  - When asked about past meetings, previous interactions, or meeting history,
    call get_meeting_history with the account_name parameter.
  - When asked about contacts, relationships, engagement levels, or the
    relationship map at an account,
    call get_relationship_map with the account_name parameter.
  - When asked to log, save, or record a meeting note or action item,
    call log_meeting_note with the meeting_id and note parameters.
    If the rep does not provide a meeting_id, ask them to specify which meeting
    the note belongs to before calling the tool.
  - When asked about LinkedIn connections, new contacts to reach out to,
    prospect suggestions, or who to connect with at an account,
    call find_linkedin_prospects with the account_name parameter.

  Response guidelines:
  - When presenting upcoming meetings, always surface the preparation status badge
    ("Prep Complete", "Needs Prep", "No Brief") and flag any meetings that still
    need a brief as an immediate action item.
  - When presenting the relationship map, always highlight "Cold" contacts —
    especially C-suite or procurement stakeholders — as re-engagement priorities.
  - When presenting meeting history, include the one-sentence outcome and note
    any open action items that may have been referenced.
  - After logging a meeting note, confirm the CRM record ID and note content back
    to the rep for their records.
  - When presenting LinkedIn prospects, always highlight the IBM Relevance reason
    for each profile and note any contacts who are already in the relationship map.
    Remind the rep that results are publicly indexed profiles only and some senior
    stakeholders may not appear.
  - Never fabricate meeting or relationship data; only present data returned by tools.

tools:
  - name: get_upcoming_meetings
    description: >
      Returns 2-4 upcoming meetings scheduled with the specified account.
      Each entry includes meeting title, date and time (UTC), duration in minutes,
      location or conferencing platform, IBM-side attendees, client-side attendees,
      and a preparation status flag ("Prep Complete", "Needs Prep", or "No Brief").
    input_schema:
      type: object
      properties:
        account_name:
          type: string
          description: >
            The name of the enterprise account to retrieve upcoming meetings for (e.g. "Accenture").
      required:
        - account_name

  - name: get_meeting_history
    description: >
      Returns the last 5 meetings held with the specified account. Each entry
      includes meeting title, date, a list of key attendees, the discussion topic,
      and a one-sentence outcome summary.
    input_schema:
      type: object
      properties:
        account_name:
          type: string
          description: >
            The name of the enterprise account to retrieve meeting history for (e.g. "Accenture").
      required:
        - account_name

  - name: get_relationship_map
    description: >
      Returns a relationship map of key client contacts at the specified account.
      Each entry includes contact name, title, seniority level, IBM relationship
      owner, engagement level ("Strong", "Moderate", or "Cold"), last interaction
      date, and contextual notes about the relationship.
    input_schema:
      type: object
      properties:
        account_name:
          type: string
          description: >
            The name of the enterprise account to retrieve the relationship map for (e.g. "Accenture").
      required:
        - account_name

  - name: log_meeting_note
    description: >
      Saves a rep-authored note to Salesforce CRM against a specific meeting record.
      Returns a confirmation message including the meeting ID, the note text, the
      timestamp, and the rep's name.
    input_schema:
      type: object
      properties:
        meeting_id:
          type: string
          description: >
            The unique identifier of the meeting to attach the note to
            (e.g. "mtg_001"). Obtainable from get_upcoming_meetings or get_meeting_history.
        note:
          type: string
          description: >
            The note content to be saved, such as discussion points, action items,
            or follow-up commitments (e.g. "Discussed watsonx renewal timeline;
            decision expected by end of Q3.").
      required:
        - meeting_id
        - note

  - name: find_linkedin_prospects
    description: >
      Searches for publicly indexed LinkedIn profiles of senior stakeholders
      at the specified account who would be valuable new connections for the
      IBM sales representative. Uses Tavily web search targeting C-suite, VP,
      Director, Procurement, and Head-of-level profiles. Each result includes
      the person's name, inferred job title, LinkedIn profile URL, location
      (where available), and an IBM-relevance reason. Results are limited to
      publicly Google-indexed profiles — some individuals may not appear due
      to LinkedIn privacy settings. Requires TAVILY_API_KEY to be set.
    input_schema:
      type: object
      properties:
        account_name:
          type: string
          description: >
            The name of the enterprise account to search LinkedIn prospects
            for (e.g. "Accenture").
      required:
        - account_name
